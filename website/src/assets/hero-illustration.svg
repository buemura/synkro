<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0.6" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Connection lines -->
  <path d="M 120 80 C 170 80, 170 150, 200 150" stroke="url(#grad2)" stroke-width="2" stroke-dasharray="6 4">
    <animate attributeName="stroke-dashoffset" values="20;0" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M 120 220 C 170 220, 170 150, 200 150" stroke="url(#grad2)" stroke-width="2" stroke-dasharray="6 4">
    <animate attributeName="stroke-dashoffset" values="20;0" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M 240 150 C 270 150, 270 80, 300 80" stroke="url(#grad2)" stroke-width="2" stroke-dasharray="6 4">
    <animate attributeName="stroke-dashoffset" values="20;0" dur="2.5s" repeatCount="indefinite"/>
  </path>
  <path d="M 240 150 C 270 150, 270 220, 300 220" stroke="url(#grad2)" stroke-width="2" stroke-dasharray="6 4">
    <animate attributeName="stroke-dashoffset" values="20;0" dur="2.5s" repeatCount="indefinite"/>
  </path>
  <path d="M 240 150 L 300 150" stroke="url(#grad2)" stroke-width="2" stroke-dasharray="6 4">
    <animate attributeName="stroke-dashoffset" values="20;0" dur="2s" repeatCount="indefinite"/>
  </path>

  <!-- Event nodes (left) -->
  <g filter="url(#glow)">
    <rect x="60" y="60" width="60" height="40" rx="8" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
    <text x="90" y="84" text-anchor="middle" font-family="system-ui" font-size="10" fill="#a5b4fc">Event</text>
  </g>
  <g filter="url(#glow)">
    <rect x="60" y="200" width="60" height="40" rx="8" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
    <text x="90" y="224" text-anchor="middle" font-family="system-ui" font-size="10" fill="#a5b4fc">Event</text>
  </g>

  <!-- Central orchestrator -->
  <g filter="url(#glow)">
    <rect x="170" y="125" width="70" height="50" rx="12" fill="url(#grad1)" stroke="#a78bfa" stroke-width="1"/>
    <text x="205" y="146" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="700" fill="#ffffff">Synkro</text>
    <text x="205" y="162" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e7ff">orchestrator</text>
  </g>

  <!-- Handler nodes (right) -->
  <g filter="url(#glow)">
    <rect x="280" y="60" width="60" height="40" rx="8" fill="#1e1b4b" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="310" y="84" text-anchor="middle" font-family="system-ui" font-size="10" fill="#c4b5fd">Step 1</text>
  </g>
  <g filter="url(#glow)">
    <rect x="280" y="130" width="60" height="40" rx="8" fill="#1e1b4b" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="310" y="154" text-anchor="middle" font-family="system-ui" font-size="10" fill="#c4b5fd">Step 2</text>
  </g>
  <g filter="url(#glow)">
    <rect x="280" y="200" width="60" height="40" rx="8" fill="#1e1b4b" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="310" y="224" text-anchor="middle" font-family="system-ui" font-size="10" fill="#c4b5fd">Step 3</text>
  </g>

  <!-- Animated dots flowing along paths -->
  <circle r="3" fill="#a78bfa">
    <animateMotion dur="2s" repeatCount="indefinite" path="M 120 80 C 170 80, 170 150, 200 150"/>
  </circle>
  <circle r="3" fill="#a78bfa">
    <animateMotion dur="2.5s" repeatCount="indefinite" path="M 240 150 C 270 150, 270 80, 300 80"/>
  </circle>
  <circle r="3" fill="#8b5cf6">
    <animateMotion dur="2s" repeatCount="indefinite" path="M 240 150 L 300 150"/>
  </circle>
</svg>
