<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <defs>
    <linearGradient id="clockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Outer clock ring -->
  <circle cx="60" cy="60" r="48" stroke="url(#clockGrad)" stroke-width="4" fill="none"/>

  <!-- Tick marks -->
  <line x1="60" y1="16" x2="60" y2="24" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="96" x2="60" y2="104" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
  <line x1="16" y1="60" x2="24" y2="60" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
  <line x1="96" y1="60" x2="104" y2="60" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>

  <!-- Small tick marks -->
  <line x1="91" y1="29" x2="87" y2="36" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
  <line x1="91" y1="91" x2="87" y2="84" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
  <line x1="29" y1="29" x2="33" y2="36" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
  <line x1="29" y1="91" x2="33" y2="84" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>

  <!-- Hour hand -->
  <line x1="60" y1="60" x2="60" y2="32" stroke="#6366f1" stroke-width="4" stroke-linecap="round"/>

  <!-- Minute hand -->
  <line x1="60" y1="60" x2="82" y2="42" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="60" cy="60" r="4" fill="url(#clockGrad)"/>

  <!-- Circular arrow (sync indicator) -->
  <path d="M 88 28 A 38 38 0 0 1 98 60" stroke="url(#arrowGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <polygon points="100,55 104,65 94,63" fill="#a78bfa"/>

  <!-- Text: synkro -->
  <text x="128" y="72" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="52" font-weight="700" fill="#e2e8f0" letter-spacing="-1">synkro</text>
</svg>
